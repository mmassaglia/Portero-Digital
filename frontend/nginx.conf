server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /admin.html {
        try_files /admin.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
